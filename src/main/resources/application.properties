server.port=${PORT:8080}
spring.application.name=restaurante-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/restaurante_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

jwt.secret=${JWT_SECRET:clave-secreta-restaurante-sistema-2026-muy-segura-256bits}
jwt.expiration=86400000

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/imagenes

logging.level.com.restaurante=INFO
logging.level.org.springframework.security=WARN
